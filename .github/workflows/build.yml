name: Build Mobi Doc Eraser Passcode V1.0

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            file_name: "MobiDocEraser"
            name: "Windows"
          - os: ubuntu-latest
            file_name: "MobiDocEraser"
            name: "Linux"
          - os: macos-latest
            file_name: "MobiDocEraser"
            name: "macOS ARM"
          - os: macos-13
            file_name: "MobiDocEraser"
            name: "macOS Intel"

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies (Linux & macOS)
      if: runner.os != 'Windows'
      run: |
        pip install PyQt5 pymobiledevice3==7.8.3 pyusb pyinstaller certifi

    - name: Install Dependencies (Windows)
      if: runner.os == 'Windows'
      run: |
        pip install PyQt5 pymobiledevice3==7.8.3 pyusb pyinstaller pywin32 certifi

    # ---- Téléchargement et extraction de libusb (Windows) ----
    - name: Download libusb DLL (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        curl -L -o libusb.7z "https://github.com/libusb/libusb/releases/download/v1.0.26/libusb-1.0.26.7z"
        7z x libusb.7z -o. -y
        # Recherche récursive de la DLL et copie dans le répertoire courant
        $dll = Get-ChildItem -Recurse -Filter "libusb-1.0.dll" | Select-Object -First 1
        if ($dll) {
          Copy-Item $dll.FullName .
          Write-Host "✅ libusb-1.0.dll copié depuis $($dll.FullName)"
        } else {
          Write-Host "❌ libusb-1.0.dll introuvable"
          exit 1
        }

    - name: Install libusb (macOS)
      if: runner.os == 'macOS'
      run: brew install libusb

    - name: Install libusb (Linux)
      if: runner.os == 'Linux'
      run: sudo apt-get update && sudo apt-get install -y libusb-1.0-0-dev libudev-dev

    - name: Install DMG Creator (macOS)
      if: runner.os == 'macOS'
      run: brew install create-dmg

    # ---- Build macOS ----
    - name: Build with PyInstaller (macOS)
      if: runner.os == 'macOS'
      env:
        MACOSX_DEPLOYMENT_TARGET: "10.13"
      run: |
        pyinstaller --noconfirm --windowed \
          --name "${{ matrix.file_name }}" \
          --add-data "boot:boot" \
          --add-data "logo.png:." \
          --add-data "logo.icns:." \
          --icon "logo.icns" \
          --collect-all pymobiledevice3 \
          --collect-all certifi \
          --hidden-import pymobiledevice3 \
          main.py

    # ---- Build Windows (avec inclusion de la DLL) ----
    - name: Build with PyInstaller (Windows)
      if: runner.os == 'Windows'
      shell: bash
      run: |
        pyinstaller --noconfirm --onefile --windowed \
          --name "${{ matrix.file_name }}" \
          --add-data "boot;boot" \
          --add-data "logo.png;." \
          --add-binary "libusb-1.0.dll;." \
          --icon "logo.ico" \
          --collect-all pymobiledevice3 \
          --collect-all certifi \
          --hidden-import pymobiledevice3 \
          main.py

    # ---- Build Linux ----
    - name: Build with PyInstaller (Linux)
      if: runner.os == 'Linux'
      run: |
        pyinstaller --noconfirm --onefile --windowed \
          --name "${{ matrix.file_name }}" \
          --add-data "boot:boot" \
          --add-data "logo.png:." \
          --collect-all pymobiledevice3 \
          --collect-all certifi \
          --hidden-import pymobiledevice3 \
          main.py

    # ---- Package macOS DMG ----
    - name: Package macOS DMG
      if: runner.os == 'macOS'
      run: |
        cd dist
        APP_NAME="${{ matrix.file_name }}.app"
        if [ -d "$APP_NAME" ]; then
          plutil -replace LSMinimumSystemVersion -string "10.13" "$APP_NAME/Contents/Info.plist"
          codesign --force --deep --sign - "$APP_NAME"
          create-dmg \
            --volname "Mobi Doc Eraser" \
            --window-pos 200 120 \
            --window-size 600 300 \
            --icon-size 100 \
            --text-size 12 \
            --hide-extension "$APP_NAME" \
            --app-drop-link 450 140 \
            --icon "$APP_NAME" 150 140 \
            "${{ matrix.file_name }}.dmg" \
            "$APP_NAME"
        else
          echo "❌ .app not found in dist/"
          exit 1
        fi

    # ---- Upload des artefacts ----
    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.name }}
        path: |
          dist/*.dmg
          dist/*.exe
          dist/${{ matrix.file_name }}
