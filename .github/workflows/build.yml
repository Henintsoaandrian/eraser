name: Build Mobi Doc Eraser Passcode V1.0

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            file_name: "MobiDocEraser"
            name: "Windows"
          - os: ubuntu-latest
            file_name: "MobiDocEraser"
            name: "Linux"
          - os: macos-latest
            file_name: "MobiDocEraser"
            name: "macOS ARM"
          - os: macos-13               # Intel officiel
            file_name: "MobiDocEraser"
            name: "macOS Intel"

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # --- Dépendances (PyInstaller) ---
    - name: Install Dependencies (Linux & macOS)
      if: runner.os != 'Windows'
      run: |
        pip install PyQt5 pymobiledevice3==7.8.3 pyusb pyinstaller

    - name: Install Dependencies (Windows)
      if: runner.os == 'Windows'
      run: |
        pip install PyQt5 pymobiledevice3==7.8.3 pyusb pyinstaller pywin32

    - name: Install libusb (macOS)
      if: runner.os == 'macOS'
      run: brew install libusb

    - name: Install libusb (Linux)
      if: runner.os == 'Linux'
      run: sudo apt-get update && sudo apt-get install -y libusb-1.0-0-dev libudev-dev

    - name: Install DMG Creator (macOS)
      if: runner.os == 'macOS'
      run: brew install create-dmg

    # --- Build macOS (création d'un .app) ---
    - name: Build with PyInstaller (macOS)
      if: runner.os == 'macOS'
      env:
        MACOSX_DEPLOYMENT_TARGET: "10.13"
      run: |
        pyinstaller --noconfirm --windowed \
          --name "${{ matrix.file_name }}" \
          --add-data "boot:boot" \
          --add-data "logo.png:." \
          --add-data "logo.icns:." \
          --icon "logo.icns" \
          --collect-all pymobiledevice3 \
          --hidden-import pymobiledevice3 \
          main.py

    # --- Build Windows (exécutable unique) ---
    - name: Build with PyInstaller (Windows)
      if: runner.os == 'Windows'
      run: |
        pyinstaller --noconfirm --onefile --windowed \
          --name "${{ matrix.file_name }}" \
          --add-data "boot;boot" \
          --add-data "logo.png;." \
          --icon "logo.ico" \
          --collect-all pymobiledevice3 \
          --hidden-import pymobiledevice3 \
          main.py

    # --- Build Linux (exécutable unique) ---
    - name: Build with PyInstaller (Linux)
      if: runner.os == 'Linux'
      run: |
        pyinstaller --noconfirm --onefile --windowed \
          --name "${{ matrix.file_name }}" \
          --add-data "boot:boot" \
          --add-data "logo.png:." \
          --collect-all pymobiledevice3 \
          --hidden-import pymobiledevice3 \
          main.py

    # --- Package macOS DMG ---
    - name: Package macOS DMG
      if: runner.os == 'macOS'
      run: |
        cd dist
        APP_NAME="${{ matrix.file_name }}.app"
        if [ -d "$APP_NAME" ]; then
          plutil -replace LSMinimumSystemVersion -string "10.13" "$APP_NAME/Contents/Info.plist"
          codesign --force --deep --sign - "$APP_NAME"
          create-dmg \
            --volname "Mobi Doc Eraser" \
            --window-pos 200 120 \
            --window-size 600 300 \
            --icon-size 100 \
            --text-size 12 \
            --hide-extension "$APP_NAME" \
            --app-drop-link 450 140 \
            --icon "$APP_NAME" 150 140 \
            "${{ matrix.file_name }}.dmg" \
            "$APP_NAME"
        else
          echo "❌ .app not found in dist/"
          exit 1
        fi

    # --- Upload des artefacts ---
    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.name }}
        path: |
          dist/*.dmg
          dist/*.exe
          dist/${{ matrix.file_name }}
